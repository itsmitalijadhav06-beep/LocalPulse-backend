name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: local-pulse-ui/package-lock.json

      - name: Install dependencies
        working-directory: local-pulse-ui
        run: npm install

      - name: Build web application
        working-directory: local-pulse-ui
        run: npm run build

      - name: Sync Capacitor project
        working-directory: local-pulse-ui
        run: npx cap sync

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradlew Executable
        working-directory: local-pulse-ui/android
        run: chmod +x gradlew

      - name: Build Android APK
        working-directory: local-pulse-ui/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: localpulse-app
          path: local-pulse-ui/android/app/build/outputs/apk/debug/app-debug.apk
